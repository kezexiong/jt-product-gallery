<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>产品详情页</title>
        <link rel="stylesheet" href="detail.css" />
        <!-- catalog.js removed to reduce network requests (detail page doesn't require it) -->
        <!-- Google Fonts import removed to avoid slow external font loading -->
    </head>
    <body>
        <div class="app">
            <!-- 顶部导航栏 -->
            <header class="header">
                <button class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
                        />
                    </svg>
                </button>
                <h1 class="page-title">产品详情页</h1>
                <button class="share-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"
                        />
                    </svg>
                </button>
            </header>

            <!-- 产品图片轮播 -->
            <div class="product-gallery">
                <div class="gallery-main">
                    <img id="mainImage" src="" alt="产品主图" />
                </div>
                <div class="gallery-indicators"></div>
            </div>

            <!-- 产品信息 -->
            <div class="product-detail">
                <h2 class="product-title"></h2>

                <div class="product-meta">
                    <div class="meta-item">
                        <span class="meta-label">品牌</span>
                        <span class="meta-value">OEM/ODM定制</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">规格</span>
                        <span class="meta-value">尺寸可定制</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">产地</span>
                        <span class="meta-value">中国广东</span>
                    </div>
                </div>

                <div class="product-description">
                    <h3 class="section-title">产品详情</h3>
                    <div class="description-content">
                        <p>专业化妆品包装解决方案，支持OEM/ODM定制服务。</p>
                        <p>• 精选优质原材料，品质可靠</p>
                        <p>• 精密制造工艺，细节考究</p>
                        <p>• 支持个性化定制，满足品牌需求</p>
                        <p>• 适用于各类彩妆产品包装</p>
                    </div>
                </div>
            </div>

            <!-- 底部占位 -->
            <div class="bottom-space"></div>
        </div>

        <!-- 返回顶部按钮 -->
        <button class="back-to-top" id="backToTop">
            <span>返回</span>
        </button>

        <!-- 回到首页按钮 -->
        <a href="index.html" class="back-to-home" id="backToHome">
            <span>回到首页</span>
        </a>

        <script src="detail.js"></script>
    </body>
</html>
